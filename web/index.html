<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jaspr Browser Playground</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.50.0/min/vs/editor/editor.main.css">
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f6f8;
        --panel: #ffffff;
        --text: #1e2329;
        --muted: #66717f;
        --line: #d9dee7;
        --accent: #1668dc;
        --accent-text: #ffffff;
        --code-bg: #101114;
        --code-text: #f1f4f8;
        --editor-fr: 1fr;
        --preview-fr: 1fr;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #121418;
          --panel: #191c22;
          --text: #e8ebf0;
          --muted: #9aa5b3;
          --line: #303640;
          --accent: #5b9bff;
          --accent-text: #07111f;
          --code-bg: #0d0f13;
          --code-text: #f1f4f8;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 650;
      }

      .status {
        color: var(--muted);
        font-size: 13px;
      }

      .main {
        display: grid;
        grid-template-columns:
          minmax(280px, var(--editor-fr))
          8px
          minmax(280px, var(--preview-fr));
        min-height: 0;
        min-width: 0;
        overflow: hidden;
      }

      .pane {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        min-width: 0;
        overflow: hidden;
        border-right: 1px solid var(--line);
        background: var(--panel);
      }

      .pane:last-child {
        border-right: 0;
      }

      .splitter {
        position: relative;
        z-index: 2;
        border: 0;
        border-radius: 0;
        padding: 0;
        min-width: 0;
        width: 8px;
        height: 100%;
        background:
          linear-gradient(to right, transparent 0 3px, var(--line) 3px 5px, transparent 5px 8px);
        cursor: col-resize;
      }

      .splitter:hover,
      .splitter:focus-visible,
      body.resizing .splitter {
        background:
          linear-gradient(to right, transparent 0 2px, var(--accent) 2px 6px, transparent 6px 8px);
        outline: none;
      }

      body.resizing {
        cursor: col-resize;
        user-select: none;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 49px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--line);
      }

      .toolbar-title {
        color: var(--muted);
        font-size: 13px;
      }

      .toolbar-left {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .toggle-explorer {
        min-width: 88px;
        height: 32px;
      }

      .active-file-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--muted);
        font-size: 13px;
      }

      .editor-workbench {
        display: grid;
        grid-template-columns: minmax(160px, 220px) minmax(0, 1fr);
        min-height: 0;
        min-width: 0;
      }

      .editor-workbench.explorer-collapsed {
        grid-template-columns: 0 minmax(0, 1fr);
      }

      .editor-workbench.explorer-collapsed .explorer {
        visibility: hidden;
        border-right: 0;
      }

      .explorer {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border-right: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel) 94%, var(--code-bg));
      }

      .explorer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 40px;
        padding: 8px 10px;
        border-bottom: 1px solid var(--line);
      }

      .explorer-title {
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .explorer-actions {
        display: flex;
        gap: 4px;
      }

      .icon-button {
        min-width: 28px;
        width: 28px;
        height: 28px;
        padding: 0;
      }

      .explorer-tree {
        margin: 0;
        padding: 8px 0;
        overflow: auto;
        list-style: none;
        font-size: 13px;
      }

      .explorer-tree ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .explorer-node {
        display: flex;
        align-items: center;
        gap: 6px;
        width: 100%;
        min-width: 0;
        height: 28px;
        padding: 0 8px;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: var(--text);
        text-align: left;
      }

      .explorer-node:hover,
      .explorer-node.active {
        background: color-mix(in srgb, var(--accent) 18%, transparent);
      }

      .explorer-icon {
        width: 16px;
        flex: 0 0 16px;
        color: var(--muted);
      }

      .explorer-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      button {
        min-width: 72px;
        height: 32px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--text);
        font: inherit;
        font-size: 13px;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: var(--accent-text);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      #editor {
        width: 100%;
        height: 100%;
        min-height: 0;
        min-width: 0;
        overflow: hidden;
        background: var(--code-bg);
      }

      .preview {
        display: grid;
        grid-template-rows: minmax(0, 1fr) minmax(120px, 28%);
        min-height: 0;
        min-width: 0;
        overflow: hidden;
      }

      iframe {
        width: 100%;
        height: 100%;
        min-width: 0;
        border: 0;
        background: var(--panel);
      }

      pre {
        margin: 0;
        padding: 12px;
        overflow: auto;
        min-width: 0;
        border-top: 1px solid var(--line);
        background: var(--panel);
        color: var(--text);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        line-height: 1.45;
        white-space: pre-wrap;
      }

      @media (max-width: 860px) {
        .main {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(420px, 1fr) 8px minmax(420px, 1fr);
        }

        .pane {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .splitter {
          width: 100%;
          height: 8px;
          cursor: row-resize;
          background:
            linear-gradient(to bottom, transparent 0 3px, var(--line) 3px 5px, transparent 5px 8px);
        }

        .splitter:hover,
        .splitter:focus-visible,
        body.resizing .splitter {
          background:
            linear-gradient(to bottom, transparent 0 2px, var(--accent) 2px 6px, transparent 6px 8px);
        }

        body.resizing {
          cursor: row-resize;
        }

        .editor-workbench {
          grid-template-columns: 1fr;
          grid-template-rows: auto minmax(0, 1fr);
        }

        .editor-workbench.explorer-collapsed {
          grid-template-columns: 1fr;
          grid-template-rows: 0 minmax(0, 1fr);
        }

        .explorer {
          max-height: 180px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header>
        <h1>Jaspr Browser Playground</h1>
        <div id="status" class="status">Loading compiler...</div>
      </header>
      <main class="main">
        <section class="pane">
          <div class="toolbar">
            <div class="toolbar-left">
              <button id="toggle-explorer" class="toggle-explorer" type="button">Explorer</button>
              <span id="active-file-label" class="active-file-label"></span>
            </div>
            <div class="actions">
              <button id="pub-get" type="button">Pub get</button>
              <button id="show-packages" type="button">Packages</button>
              <button id="reset">Reset</button>
              <button id="run" class="primary" disabled>Run</button>
            </div>
          </div>
          <div id="editor-workbench" class="editor-workbench">
            <aside class="explorer" aria-label="File explorer">
              <div class="explorer-header">
                <span class="explorer-title">Explorer</span>
                <div class="explorer-actions">
                  <button id="new-file" class="icon-button" type="button" title="New file">+</button>
                  <button id="rename-file" class="icon-button" type="button" title="Rename active file">↵</button>
                  <button id="delete-file" class="icon-button" type="button" title="Delete active file">−</button>
                </div>
              </div>
              <ul id="explorer-tree" class="explorer-tree"></ul>
            </aside>
            <div id="editor"></div>
          </div>
        </section>
        <button id="splitter" class="splitter" type="button" aria-label="Resize editor and preview panes"></button>
        <section class="pane">
          <div class="toolbar">
            <span class="toolbar-title">DDC iframe preview</span>
          </div>
          <div class="preview">
            <iframe id="preview" src="adapters/jaspr/preview.html" sandbox="allow-scripts allow-same-origin"></iframe>
            <pre id="log">Waiting for compiler...</pre>
          </div>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.50.0/min/vs/loader.js"></script>
    <script type="module">
      import {
        addDependencyToPubspec,
        buildPackageConfigFromPubspec,
        bundledPackageNames,
        missingDeclaredPackageImports,
        parseSimplePubspec,
        validateDeclaredPackageImports,
      } from './lib/pubspec.js';
      import {
        HostedPubPackageSource,
      } from './lib/hosted_pub_source.js';
      import {
        assertSimplePubspecDependencies,
        formatPackagesReport,
        formatPubGetSuccess,
        packageResolutionDetails as makePackageResolutionDetails,
        resolveWorkspaceWithHostedPackages,
      } from './lib/package_resolution.js';
      import {
        lspRangeToMonaco,
        lspTextEditToMonaco,
        lspTextEditsToWorkspaceEdit,
        lspWorkspaceEditToMonaco,
        monacoPosToLsp,
        workspacePathFromUri,
      } from './lib/lsp.js';
      import {
        displayPath,
        fileUri,
        languageForPath,
        normalizeWorkspacePath,
        packageImportFingerprint as workspacePackageImportFingerprint,
        sortedWorkspacePaths,
        validateWorkspacePath,
        workspacePathTree,
      } from './lib/workspace.js';
      import {
        jasprAdapterConfig as adapter,
      } from './adapters/jaspr/config.js';

      const defaultWorkspace = adapter.defaultWorkspace;
      const entrypoint = adapter.entrypoint;
      const legacySample = adapter.legacySample;

      const status = document.querySelector('#status');
      const editorHost = document.querySelector('#editor');
      const editorWorkbench = document.querySelector('#editor-workbench');
      const toggleExplorerButton = document.querySelector('#toggle-explorer');
      const activeFileLabel = document.querySelector('#active-file-label');
      const explorerTree = document.querySelector('#explorer-tree');
      const newFileButton = document.querySelector('#new-file');
      const renameFileButton = document.querySelector('#rename-file');
      const deleteFileButton = document.querySelector('#delete-file');
      const pubGetButton = document.querySelector('#pub-get');
      const showPackagesButton = document.querySelector('#show-packages');
      const runButton = document.querySelector('#run');
      const resetButton = document.querySelector('#reset');
      const log = document.querySelector('#log');
      const preview = document.querySelector('#preview');
      const main = document.querySelector('.main');
      const splitter = document.querySelector('#splitter');
      const repoRoot = '.';
      const toolchainRoot = adapter.toolchainRoot;
      const LSP_OWNER = 'dart-lsp';
      const PUBSPEC_OWNER = 'pubspec-validation';
      const params = new URLSearchParams(location.search);
      const hostedPubEnabled = params.get('hostedPub') === '1';

      let compilerReady = false;
      let previewReady = false;
      let running = false;
      let monaco;
      let editor;
      let activePath = entrypoint;
      let workspace = loadWorkspace();
      let bundledPackageConfig = null;
      const models = new Map();
      const lspVersions = new Map();
      const latestDiagnosticsByUri = new Map();
      let lspReady = false;
      let lspRequestId = 1;
      const lspPendingText = new Map();
      const lspPending = new Map();
      const lspNotifyHandlers = new Map();
      let autorunStarted = false;
      let requestId = 0;
      let activeRequestId = 0;
      let pubspecDiagnosticsRequestId = 0;
      let packageConfig = null;
      let packageSources = {};
      let packageResolutionDetails = null;
      let packageResolutionState = 'dirty';
      let packageResolutionPubspec = '';
      let packageResolutionImportFingerprint = '';
      let explorerCollapsed = localStorage.getItem('dart-browser-playground-explorer-collapsed') === '1';
      const autorun = params.get('autorun') === '1';
      const hostedSource = hostedPubEnabled
        ? new HostedPubPackageSource({ origin: location.origin })
        : null;
      const compilerWorker = new Worker(adapter.compilerWorkerUrl);

      setPackageResolutionState('dirty');

      function setStatus(value) {
        status.textContent = value;
      }

      function appendLog(value) {
        log.textContent = value;
      }

      function setRunning(value) {
        running = value;
        runButton.disabled = value || !compilerReady || !previewReady;
        pubGetButton.disabled = value || packageResolutionState === 'resolving';
      }

      function setPackageResolutionState(nextState) {
        packageResolutionState = nextState;
        const label = {
          dirty: 'Pub get',
          resolving: 'Resolving...',
          resolved: 'Pub get',
          failed: 'Retry Pub get',
        }[nextState] ?? 'Pub get';
        pubGetButton.textContent = label;
        pubGetButton.disabled = running || nextState === 'resolving';
      }

      function markPubspecDirty() {
        packageConfig = null;
        packageSources = {};
        packageResolutionDetails = null;
        packageResolutionPubspec = '';
        packageResolutionImportFingerprint = '';
        setPackageResolutionState('dirty');
      }

      function markDependenciesDirtyIfNeeded(previousPath, previousSource) {
        if (packageResolutionState !== 'resolved') return;
        if (previousPath === '/pubspec.yaml') {
          if (previousSource !== workspace['/pubspec.yaml']) markPubspecDirty();
          return;
        }
        if (previousPath?.endsWith('.dart')) {
          const currentFingerprint = packageImportFingerprint();
          if (currentFingerprint !== packageResolutionImportFingerprint) markPubspecDirty();
        }
      }

      function packageImportFingerprint() {
        return workspacePackageImportFingerprint(workspace);
      }

      function packageResolutionIsCurrent() {
        return (
          packageResolutionState === 'resolved' &&
          Boolean(packageConfig) &&
          packageResolutionPubspec === workspace['/pubspec.yaml'] &&
          packageResolutionImportFingerprint === packageImportFingerprint()
        );
      }

      async function maybeAutorun() {
        if (!autorun || autorunStarted || !compilerReady || !previewReady) return;
        autorunStarted = true;
        if (await runPubGet()) {
          await run();
        }
      }

      function cloneDefaultWorkspace() {
        return Object.fromEntries(
          Object.entries(defaultWorkspace).map(([path, source]) => [path, source]),
        );
      }

      function loadWorkspace() {
        const stored = localStorage.getItem(adapter.workspaceStorageKey);
        if (stored) {
          try {
            const parsed = JSON.parse(stored);
            if (parsed && typeof parsed === 'object' && typeof parsed[entrypoint] === 'string') {
              return {
                ...parsed,
                '/pubspec.yaml': typeof parsed['/pubspec.yaml'] === 'string'
                  ? parsed['/pubspec.yaml']
                  : defaultWorkspace['/pubspec.yaml'],
              };
            }
          } catch (_) {
            // Fall through to legacy migration/default workspace.
          }
        }

        const legacy = localStorage.getItem(adapter.legacySourceStorageKey);
        if (legacy && legacy !== legacySample) {
          return { ...cloneDefaultWorkspace(), [entrypoint]: legacy };
        }
        return cloneDefaultWorkspace();
      }

      function saveWorkspace() {
        localStorage.setItem(adapter.workspaceStorageKey, JSON.stringify(workspace));
      }

      function sortedPaths() {
        return sortedWorkspacePaths(workspace, { entrypoint });
      }

      function pathTree() {
        return workspacePathTree(workspace, { entrypoint });
      }

      function renderExplorerNode(node, parent, depth) {
        for (const [name, child] of [...node.dirs.entries()].sort(([a], [b]) => a.localeCompare(b))) {
          const item = document.createElement('li');
          const row = document.createElement('div');
          row.className = 'explorer-node';
          row.style.paddingLeft = `${8 + depth * 14}px`;
          row.innerHTML = `<span class="explorer-icon">▾</span><span class="explorer-name"></span>`;
          row.querySelector('.explorer-name').textContent = name;
          item.append(row);
          const list = document.createElement('ul');
          renderExplorerNode(child, list, depth + 1);
          item.append(list);
          parent.append(item);
        }

        for (const file of node.files.sort((a, b) => a.name.localeCompare(b.name))) {
          const item = document.createElement('li');
          const button = document.createElement('button');
          button.type = 'button';
          button.className = `explorer-node${file.path === activePath ? ' active' : ''}`;
          button.style.paddingLeft = `${8 + depth * 14}px`;
          button.title = file.path;
          button.innerHTML = `<span class="explorer-icon">${file.path.endsWith('.dart') ? 'D' : 'Y'}</span><span class="explorer-name"></span>`;
          button.querySelector('.explorer-name').textContent = file.name;
          button.addEventListener('click', () => switchFile(file.path));
          item.append(button);
          parent.append(item);
        }
      }

      function renderExplorer() {
        explorerTree.replaceChildren();
        renderExplorerNode(pathTree(), explorerTree, 0);
        deleteFileButton.disabled = activePath === entrypoint || activePath === '/pubspec.yaml' || sortedPaths().length <= 1;
        renameFileButton.disabled = activePath === entrypoint || activePath === '/pubspec.yaml';
      }

      function renderWorkspaceChrome() {
        activeFileLabel.textContent = activePath;
        activeFileLabel.title = activePath;
        renderExplorer();
      }

      function modelForPath(path) {
        let model = models.get(path);
        if (!model) {
          model = monaco.editor.createModel(
            workspace[path],
            languageForPath(path),
            monaco.Uri.parse(fileUri(path)),
          );
          models.set(path, model);
          lspVersions.set(path, 1);
        }
        return model;
      }

      function switchFile(path) {
        if (workspace[path] === undefined || !editor) return;
        activePath = path;
        editor.setModel(modelForPath(path));
        renderWorkspaceChrome();
        requestAnimationFrame(() => editor?.layout());
      }

      function applyExplorerCollapsed() {
        editorWorkbench.classList.toggle('explorer-collapsed', explorerCollapsed);
        toggleExplorerButton.textContent = explorerCollapsed ? 'Show files' : 'Hide files';
        toggleExplorerButton.setAttribute('aria-expanded', String(!explorerCollapsed));
        localStorage.setItem('dart-browser-playground-explorer-collapsed', explorerCollapsed ? '1' : '0');
        requestAnimationFrame(() => editor?.layout());
      }

      function lspDidOpen(path) {
        if (!path.endsWith('.dart')) return;
        if (!lspReady) return;
        lspNotify('textDocument/didOpen', {
          textDocument: {
            uri: fileUri(path),
            languageId: 'dart',
            version: lspVersions.get(path) ?? 1,
            text: workspace[path],
          },
        });
      }

      function lspDidClose(path) {
        if (!path.endsWith('.dart')) return;
        if (!lspReady) return;
        lspNotify('textDocument/didClose', {
          textDocument: { uri: fileUri(path) },
        });
      }

      function createFile() {
        const requested = prompt('New Dart file path', '/lib/components/new_component.dart');
        if (requested === null) return;
        const { path, error } = validateWorkspacePath(requested, workspace, {
          protectedPaths: [entrypoint, '/pubspec.yaml'],
        });
        if (error) {
          alert(error);
          if (path && workspace[path] !== undefined) switchFile(path);
          return;
        }
        if (!path) return;
        if (workspace[path] !== undefined) {
          switchFile(path);
          return;
        }
        workspace[path] = adapter.newFileTemplate ?? '';
        saveWorkspace();
        modelForPath(path);
        lspDidOpen(path);
        switchFile(path);
        markPubspecDirty();
        void updatePubspecDiagnostics();
      }

      function renameActiveFile() {
        if (activePath === entrypoint || activePath === '/pubspec.yaml') {
          alert('This file cannot be renamed yet.');
          return;
        }
        const requested = prompt('Rename file', activePath);
        if (requested === null) return;
        const { path: nextPath, error } = validateWorkspacePath(requested, workspace, {
          currentPath: activePath,
          protectedPaths: [entrypoint, '/pubspec.yaml'],
        });
        if (error) {
          alert(error);
          return;
        }
        if (!nextPath || nextPath === activePath) return;

        const source = currentSource();
        lspDidClose(activePath);
        const oldModel = models.get(activePath);
        oldModel?.dispose();
        models.delete(activePath);
        lspVersions.delete(activePath);
        delete workspace[activePath];

        workspace[nextPath] = source;
        activePath = nextPath;
        saveWorkspace();
        editor?.setModel(modelForPath(activePath));
        lspDidOpen(activePath);
        renderWorkspaceChrome();
        markPubspecDirty();
        void updatePubspecDiagnostics();
      }

      function deleteActiveFile() {
        if (activePath === entrypoint || activePath === '/pubspec.yaml') {
          alert('This file cannot be deleted.');
          return;
        }
        if (!confirm(`Delete ${activePath}?`)) return;

        lspDidClose(activePath);
        const oldModel = models.get(activePath);
        oldModel?.dispose();
        models.delete(activePath);
        lspVersions.delete(activePath);
        delete workspace[activePath];
        activePath = entrypoint;
        saveWorkspace();
        editor?.setModel(modelForPath(activePath));
        renderWorkspaceChrome();
        markPubspecDirty();
        void updatePubspecDiagnostics();
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function applySplit(percent) {
        const next = clamp(percent, 20, 80);
        document.documentElement.style.setProperty('--editor-fr', `${next}fr`);
        document.documentElement.style.setProperty('--preview-fr', `${100 - next}fr`);
        localStorage.setItem(adapter.splitStorageKey, String(next));
        splitter.setAttribute('aria-valuenow', String(Math.round(next)));
        editor?.layout();
        requestAnimationFrame(() => editor?.layout());
      }

      function splitFromPointer(event) {
        const rect = main.getBoundingClientRect();
        const vertical = matchMedia('(max-width: 860px)').matches;
        const position = vertical
          ? event.clientY - rect.top
          : event.clientX - rect.left;
        const size = vertical ? rect.height : rect.width;
        return (position / size) * 100;
      }

      function initSplitter() {
        splitter.setAttribute('role', 'separator');
        splitter.setAttribute('aria-orientation', 'vertical');
        splitter.setAttribute('aria-valuemin', '20');
        splitter.setAttribute('aria-valuemax', '80');
        applySplit(Number(localStorage.getItem(adapter.splitStorageKey)) || 50);

        splitter.addEventListener('pointerdown', (event) => {
          event.preventDefault();
          splitter.setPointerCapture(event.pointerId);
          document.body.classList.add('resizing');
        });

        splitter.addEventListener('pointermove', (event) => {
          if (!splitter.hasPointerCapture(event.pointerId)) return;
          applySplit(splitFromPointer(event));
        });

        function stopResize(event) {
          if (splitter.hasPointerCapture(event.pointerId)) {
            splitter.releasePointerCapture(event.pointerId);
          }
          document.body.classList.remove('resizing');
        }

        splitter.addEventListener('pointerup', stopResize);
        splitter.addEventListener('pointercancel', stopResize);
        splitter.addEventListener('keydown', (event) => {
          const current = Number(localStorage.getItem(adapter.splitStorageKey)) || 50;
          const vertical = matchMedia('(max-width: 860px)').matches;
          const decrease = vertical ? event.key === 'ArrowUp' : event.key === 'ArrowLeft';
          const increase = vertical ? event.key === 'ArrowDown' : event.key === 'ArrowRight';
          if (decrease || increase) {
            event.preventDefault();
            applySplit(current + (increase ? 5 : -5));
          } else if (event.key === 'Home') {
            event.preventDefault();
            applySplit(20);
          } else if (event.key === 'End') {
            event.preventDefault();
            applySplit(80);
          } else if (event.key === 'Enter') {
            event.preventDefault();
            applySplit(50);
          }
        });
      }

      function currentSource() {
        return editor ? editor.getValue() : workspace[activePath];
      }

      function setSource(value) {
        editor?.setValue(value);
      }

      async function loadBundledPackageConfig() {
        if (bundledPackageConfig) return bundledPackageConfig;
        const response = await fetch(`${toolchainRoot}/web_compiler/package_config.json`);
        if (!response.ok) {
          throw new Error(`Failed to load bundled package_config.json: HTTP ${response.status}`);
        }
        bundledPackageConfig = await response.json();
        return bundledPackageConfig;
      }

      async function packageConfigForWorkspace() {
        const pubspec = parseSimplePubspec(workspace['/pubspec.yaml']);
        validateDeclaredPackageImports(pubspec, workspace);
        const baseConfig = await loadBundledPackageConfig();
        return buildPackageConfigFromPubspec(baseConfig, pubspec);
      }

      async function packageConfigForWorkspaceWithHostedPackages() {
        const baseConfig = await loadBundledPackageConfig();
        return resolveWorkspaceWithHostedPackages({
          workspace,
          baseConfig,
          hostedSource,
        });
      }

      async function runPubGet() {
        if (packageResolutionState === 'resolving') return false;
        workspace[activePath] = currentSource();
        saveWorkspace();
        setPackageResolutionState('resolving');
        setStatus('Resolving pubspec...');
        appendLog(hostedPubEnabled
          ? 'Running Pub get against bundled packages plus hosted pub.dev packages...'
          : 'Running Pub get against bundled playground packages...');
        try {
          if (hostedPubEnabled) {
            const resolved = await packageConfigForWorkspaceWithHostedPackages();
            packageConfig = resolved.packageConfig;
            packageSources = resolved.packageSources;
            packageResolutionDetails = makePackageResolutionDetails({
              mode: 'hosted',
              hostedDependencies: resolved.hostedDependencies,
              loaded: resolved.loaded,
              resolvedPackageCount: resolved.resolvedPackageCount,
            });
            appendLog(formatPubGetSuccess(packageResolutionDetails));
          } else {
            packageConfig = await packageConfigForWorkspace();
            packageSources = {};
            packageResolutionDetails = makePackageResolutionDetails({
              mode: 'bundled',
              hostedDependencies: {},
              loaded: [],
              resolvedPackageCount: 0,
            });
            appendLog(formatPubGetSuccess(packageResolutionDetails));
          }
          packageResolutionPubspec = workspace['/pubspec.yaml'];
          packageResolutionImportFingerprint = packageImportFingerprint();
          setPackageResolutionState('resolved');
          setStatus(compilerReady && previewReady ? 'Ready' : 'Pub get resolved');
          await updatePubspecDiagnostics();
          return true;
        } catch (error) {
          packageConfig = null;
          packageSources = {};
          packageResolutionDetails = null;
          packageResolutionPubspec = '';
          packageResolutionImportFingerprint = '';
          setPackageResolutionState('failed');
          setStatus('Pub get failed');
          appendLog(String((error && error.message) || error));
          await updatePubspecDiagnostics();
          return false;
        }
      }

      async function updatePubspecDiagnostics() {
        if (!monaco) return;
        const currentRequestId = ++pubspecDiagnosticsRequestId;
        const model = modelForPath('/pubspec.yaml');
        try {
          const pubspec = parseSimplePubspec(workspace['/pubspec.yaml']);
          validateDeclaredPackageImports(pubspec, workspace);
          if (hostedPubEnabled) {
            assertSimplePubspecDependencies(pubspec);
          } else {
            const baseConfig = await loadBundledPackageConfig();
            buildPackageConfigFromPubspec(baseConfig, pubspec);
          }
          if (currentRequestId !== pubspecDiagnosticsRequestId) return;
          monaco.editor.setModelMarkers(model, PUBSPEC_OWNER, []);
        } catch (error) {
          if (currentRequestId !== pubspecDiagnosticsRequestId) return;
          const endLineNumber = Math.max(1, model.getLineCount());
          monaco.editor.setModelMarkers(model, PUBSPEC_OWNER, [{
            severity: monaco.MarkerSeverity.Error,
            message: String((error && error.message) || error),
            startLineNumber: 1,
            startColumn: 1,
            endLineNumber,
            endColumn: Math.max(1, model.getLineMaxColumn(endLineNumber)),
          }]);
        }
      }

      async function showPackages() {
        try {
          const baseConfig = await loadBundledPackageConfig();
          appendLog(formatPackagesReport({
            baseConfig,
            packageConfig,
            packageResolution: packageResolutionDetails,
            hostedPubEnabled,
          }));
        } catch (error) {
          appendLog(`Could not show packages: ${String((error && error.message) || error)}`);
        }
      }

      function addDependency(packageName) {
        const next = addDependencyToPubspec(workspace['/pubspec.yaml'], packageName);
        workspace['/pubspec.yaml'] = next;
        saveWorkspace();
        const pubspecModel = modelForPath('/pubspec.yaml');
        if (pubspecModel.getValue() !== next) pubspecModel.setValue(next);
        markPubspecDirty();
        void updatePubspecDiagnostics();
        appendLog(`Added ${packageName}: any to pubspec.yaml. Run Pub get to resolve it.`);
      }

      async function run() {
        if (!compilerReady || !previewReady || running || !editor) return;
        setRunning(true);
        workspace[activePath] = currentSource();
        saveWorkspace();

        if (
          !packageResolutionIsCurrent()
        ) {
          setRunning(false);
          markPubspecDirty();
          setStatus('Run Pub get first');
          appendLog('Run Pub get before compiling. The compiler uses the last resolved package_config.json.');
          return;
        }

        setStatus('Compiling...');
        appendLog('Compiling in worker...');
        activeRequestId = ++requestId;
        compilerWorker.postMessage({
          channel: 'jaspr-ddc-compiler-main',
          type: 'compile',
          requestId: activeRequestId,
          entrypoint,
          files: workspace,
          packageConfig,
          packageSources,
        });
      }

      function loadMonaco() {
        return new Promise((resolve, reject) => {
          globalThis.require.config({
            paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.50.0/min/vs' },
          });
          globalThis.require(['vs/editor/editor.main'], () => resolve(globalThis.monaco), reject);
        });
      }

      function registerDart(monaco) {
        monaco.languages.register({ id: 'dart' });
        monaco.languages.register({ id: 'yaml' });
        monaco.languages.setLanguageConfiguration('dart', {
          comments: { lineComment: '//', blockComment: ['/*', '*/'] },
          brackets: [['{', '}'], ['[', ']'], ['(', ')']],
          autoClosingPairs: [
            { open: '{', close: '}' },
            { open: '[', close: ']' },
            { open: '(', close: ')' },
            { open: "'", close: "'" },
            { open: '"', close: '"' },
          ],
        });
      }

      function lspSendReq(method, params) {
        const id = lspRequestId++;
        return new Promise((resolve, reject) => {
          lspPending.set(id, { resolve, reject });
          globalThis.lspSend(JSON.stringify({ jsonrpc: '2.0', id, method, params }));
        });
      }

      function lspNotify(method, params) {
        globalThis.lspSend(JSON.stringify({ jsonrpc: '2.0', method, params }));
      }

      function applyWorkspaceEdit(workspaceEdit) {
        const edit = lspWorkspaceEditToMonaco(workspaceEdit, monaco);
        for (const item of edit.edits) {
          const model = monaco.editor.getModel(item.resource);
          if (!model) continue;
          model.applyEdits([item.textEdit]);
          const path = workspacePathFromUri(item.resource.toString());
          if (path && workspace[path] !== undefined) {
            workspace[path] = model.getValue();
            saveWorkspace();
            lspDidChange(path, workspace[path]);
          }
        }
        return edit.edits.length > 0;
      }

      globalThis.lspReceive = (jsonText) => {
        let message;
        try { message = JSON.parse(jsonText); } catch { return; }
        if (message.id !== undefined && (message.result !== undefined || message.error !== undefined)) {
          const pending = lspPending.get(message.id);
          if (!pending) return;
          lspPending.delete(message.id);
          message.error ? pending.reject(message.error) : pending.resolve(message.result);
          return;
        }
        if (message.method && message.id !== undefined) {
          const handler = lspNotifyHandlers.get(message.method);
          const result = handler ? handler(message.params) : null;
          globalThis.lspSend(JSON.stringify({ jsonrpc: '2.0', id: message.id, result }));
          return;
        }
        if (message.method) {
          lspNotifyHandlers.get(message.method)?.(message.params);
        }
      };

      lspNotifyHandlers.set('textDocument/publishDiagnostics', params => {
        if (!params?.uri || !editor) return;
        const model = monaco.editor.getModel(monaco.Uri.parse(params.uri));
        if (!model) return;
        latestDiagnosticsByUri.set(params.uri, params.diagnostics ?? []);
        const severity = {
          1: monaco.MarkerSeverity.Error,
          2: monaco.MarkerSeverity.Warning,
          3: monaco.MarkerSeverity.Info,
          4: monaco.MarkerSeverity.Hint,
        };
        const markers = (params.diagnostics ?? []).map(diagnostic => ({
          severity: severity[diagnostic.severity] ?? monaco.MarkerSeverity.Info,
          message: `${diagnostic.message ?? ''}${diagnostic.code ? ` [${diagnostic.code}]` : ''}`,
          ...lspRangeToMonaco(diagnostic.range),
        }));
        monaco.editor.setModelMarkers(model, LSP_OWNER, markers);
      });

      lspNotifyHandlers.set('workspace/applyEdit', params => {
        if (!params?.edit) return { applied: false };
        return { applied: applyWorkspaceEdit(params.edit) };
      });

      async function initLsp() {
        try {
          setStatus('Loading analyzer...');
          const [lspModule, lspWasm, sdkBuffer, packageBuffer] = await Promise.all([
            import(`${repoRoot}/dart_lsp.mjs`),
            fetch(`${repoRoot}/dart_lsp.wasm`),
            fetch(`${repoRoot}/dart_sdk.sum`).then(r => r.arrayBuffer()),
            fetch(adapter.lspPackageBundle).then(r => r.arrayBuffer()),
          ]);
          const inst = await (await lspModule.compileStreaming(lspWasm)).instantiate({});
          inst.invokeMain();
          globalThis.lspStart(new Uint8Array(sdkBuffer), new Uint8Array(packageBuffer));

          await lspSendReq('initialize', {
            processId: null,
            rootUri: 'file:///user',
            initializationOptions: {
              completionBudgetMilliseconds: 5000,
              suggestFromUnimportedLibraries: true,
              onlyAnalyzeProjectsWithOpenFiles: false,
              outline: true,
            },
            capabilities: {
              textDocument: {
                synchronization: { didOpen: true, didChange: true },
                completion: {
                  completionItem: {
                    snippetSupport: false,
                    resolveSupport: { properties: ['additionalTextEdits', 'detail', 'documentation'] },
                  },
                },
                hover: { contentFormat: ['markdown', 'plaintext'] },
                publishDiagnostics: { relatedInformation: false },
              },
              workspace: { applyEdit: true },
            },
            workspaceFolders: [{ uri: 'file:///user', name: 'user' }],
          });
          lspNotify('initialized', {});
          for (const path of sortedPaths().filter((candidate) => candidate.endsWith('.dart'))) {
            lspNotify('textDocument/didOpen', {
              textDocument: {
                uri: fileUri(path),
                languageId: 'dart',
                version: lspVersions.get(path) ?? 1,
                text: workspace[path],
              },
            });
          }
          lspReady = true;
          for (const [path, text] of lspPendingText) {
            lspDidChange(path, text);
          }
          lspPendingText.clear();
          setStatus(compilerReady && previewReady ? 'Ready' : 'Analyzer ready, waiting for compiler');
        } catch (error) {
          console.error('[jaspr playground] LSP init failed', error);
          appendLog(`Analyzer unavailable: ${String((error && error.message) || error)}`);
          setStatus(compilerReady && previewReady ? 'Ready' : 'Analyzer unavailable');
        }
      }

      function lspDidChange(path, text) {
        if (!path.endsWith('.dart')) return;
        if (!lspReady) {
          lspPendingText.set(path, text);
          return;
        }
        const version = (lspVersions.get(path) ?? 1) + 1;
        lspVersions.set(path, version);
        lspNotify('textDocument/didChange', {
          textDocument: { uri: fileUri(path), version },
          contentChanges: [{ text }],
        });
      }

      function registerLspProviders() {
        monaco.languages.registerCompletionItemProvider('dart', {
          triggerCharacters: ['.', "'", '"', '/', '@'],
          async provideCompletionItems(model, position) {
            if (!lspReady) return { suggestions: [] };
            const response = await lspSendReq('textDocument/completion', {
              textDocument: { uri: model.uri.toString() },
              position: monacoPosToLsp(position),
              context: { triggerKind: 1 },
            }).catch(() => null);
            const items = Array.isArray(response) ? response : response?.items ?? [];
            const word = model.getWordUntilPosition(position);
            const fallbackRange = {
              startLineNumber: position.lineNumber,
              endLineNumber: position.lineNumber,
              startColumn: word.startColumn,
              endColumn: word.endColumn,
            };
            return {
              suggestions: items.map(item => {
                const edit = item.textEdit ? lspTextEditToMonaco(item.textEdit) : null;
                return {
                  label: item.label,
                  kind: item.kind ?? monaco.languages.CompletionItemKind.Variable,
                  detail: item.detail,
                  documentation: typeof item.documentation === 'string'
                    ? item.documentation
                    : item.documentation?.value,
                  insertText: edit?.text ?? item.insertText ?? item.label,
                  range: edit?.range ?? fallbackRange,
                  sortText: item.sortText,
                  filterText: item.filterText,
                  _lsp: item,
                };
              }),
            };
          },
          async resolveCompletionItem(item) {
            if (!item._lsp?.data) return item;
            const resolved = await lspSendReq('completionItem/resolve', item._lsp).catch(() => null);
            if (!resolved) return item;
            const main = resolved.textEdit ? lspTextEditToMonaco(resolved.textEdit) : null;
            return {
              ...item,
              detail: resolved.detail ?? item.detail,
              documentation: typeof resolved.documentation === 'string'
                ? resolved.documentation
                : resolved.documentation?.value ?? item.documentation,
              additionalTextEdits: (resolved.additionalTextEdits ?? [])
                .map(lspTextEditToMonaco)
                .filter(Boolean),
              insertText: main?.text ?? item.insertText,
              range: main?.range ?? item.range,
            };
          },
        });

        monaco.languages.registerHoverProvider('dart', {
          async provideHover(_model, position) {
            if (!lspReady) return null;
            const response = await lspSendReq('textDocument/hover', {
              textDocument: { uri: _model.uri.toString() },
              position: monacoPosToLsp(position),
            }).catch(() => null);
            if (!response?.contents) return null;
            const value = Array.isArray(response.contents)
              ? response.contents.map(item => typeof item === 'string' ? item : item.value).join('\n\n')
              : typeof response.contents === 'string'
                ? response.contents
                : response.contents.value;
            return {
              contents: [{ value }],
              range: response.range ? lspRangeToMonaco(response.range) : undefined,
            };
          },
        });

        monaco.languages.registerCodeActionProvider('dart', {
          async provideCodeActions(model, range, _context) {
            if (!lspReady) return { actions: [], dispose() {} };
            const uri = model.uri.toString();
            const diagnostics = latestDiagnosticsByUri.get(uri) ?? [];

            const request = (lspRange) =>
              lspSendReq('textDocument/codeAction', {
                textDocument: { uri },
                range: lspRange,
                context: { diagnostics },
              }).catch(() => null);

            const requestedRange = {
              start: { line: range.startLineNumber - 1, character: range.startColumn - 1 },
              end: { line: range.endLineNumber - 1, character: range.endColumn - 1 },
            };
            const diagnosticRanges = diagnostics
              .filter((diagnostic) => diagnostic.range)
              .map((diagnostic) => diagnostic.range);

            async function completionImportActions() {
              const actions = [];
              const seen = new Set();
              for (const diagnostic of diagnostics) {
                if (!diagnostic.range || !/undefined/i.test(diagnostic.message ?? '')) continue;
                const identifier = model.getValueInRange(lspRangeToMonaco(diagnostic.range)).trim();
                if (!identifier || seen.has(identifier)) continue;

                const completion = await lspSendReq('textDocument/completion', {
                  textDocument: { uri },
                  position: diagnostic.range.end,
                  context: { triggerKind: 1 },
                }).catch(() => null);
                const items = Array.isArray(completion) ? completion : completion?.items ?? [];
                const match = items.find((item) => item.label === identifier);
                if (!match) continue;

                const resolved = await lspSendReq('completionItem/resolve', match).catch(() => null);
                if (!resolved?.additionalTextEdits?.length) continue;
                seen.add(identifier);
                actions.push({
                  title: `Add import for '${identifier}'`,
                  kind: 'quickfix',
                  isPreferred: true,
                  edit: lspTextEditsToWorkspaceEdit(uri, resolved.additionalTextEdits, monaco),
                });
              }
              return actions;
            }

            async function dependencyActions() {
              const path = workspacePathFromUri(uri);
              if (!path) return [];
              const pubspec = parseSimplePubspec(workspace['/pubspec.yaml']);
              const missing = missingDeclaredPackageImports(pubspec, { [path]: model.getValue() });
              if (!missing.length) return [];

              const baseConfig = await loadBundledPackageConfig().catch(() => null);
              const bundled = bundledPackageNames(baseConfig);
              return missing
                .filter(({ packageName }) => bundled.has(packageName))
                .map(({ packageName }) => ({
                  title: `Add '${packageName}' to pubspec.yaml`,
                  kind: 'quickfix',
                  isPreferred: true,
                  command: {
                    id: 'dart.playground.addDependency',
                    title: `Add '${packageName}' to pubspec.yaml`,
                    arguments: [packageName],
                  },
                }));
            }

            const results = await Promise.all([
              request(requestedRange),
              ...diagnosticRanges.map(request),
            ]);
            const deduped = [];
            const seenTitles = new Set();
            for (const result of results) {
              if (!Array.isArray(result)) continue;
              for (const action of result) {
                if (!action?.title || seenTitles.has(action.title)) continue;
                seenTitles.add(action.title);
                deduped.push(action);
              }
            }

            const actions = [
              ...await completionImportActions(),
              ...await dependencyActions(),
            ];
            for (const action of deduped) {
              if (action.edit) {
                actions.push({
                  title: action.title,
                  kind: action.kind ?? 'quickfix',
                  isPreferred: action.isPreferred,
                  edit: lspWorkspaceEditToMonaco(action.edit, monaco),
                });
              } else if (action.command) {
                actions.push({
                  title: action.title,
                  kind: action.kind ?? 'quickfix',
                  isPreferred: action.isPreferred,
                  command: {
                    id: 'dart.lsp.executeCommand',
                    title: action.title,
                    arguments: [action.command],
                  },
                });
              }
            }

            return { actions, dispose() {} };
          },
        });

        monaco.editor.registerCommand('dart.lsp.executeCommand', async (_accessor, command) => {
          if (!command?.command) return;
          await lspSendReq('workspace/executeCommand', {
            command: command.command,
            arguments: command.arguments ?? [],
          }).catch((error) => console.error('[dart lsp] executeCommand failed', error));
        });

        monaco.editor.registerCommand('dart.playground.addDependency', (_accessor, packageName) => {
          addDependency(packageName);
        });
      }

      compilerWorker.addEventListener('message', (event) => {
        const message = event.data;
        if (message?.channel !== 'jaspr-ddc-compiler-worker') return;

        if (message.type === 'ready') {
          compilerReady = true;
          appendLog(`Loaded compiler worker inputs: ${message.packageCount} packages, ${message.fileCount} files.`);
          setStatus(previewReady ? 'Ready' : 'Compiler ready, waiting for preview');
          setRunning(false);
          maybeAutorun();
          return;
        }

        if (message.type === 'compiled') {
          if (message.requestId !== activeRequestId) return;
          setRunning(false);
          const compiled = message.compiled;
          if (!compiled.success) {
            appendLog((compiled.diagnostics || ['Compile failed.']).join('\n'));
            setStatus(`Compile failed in ${message.elapsedMs}ms`);
            return;
          }

          appendLog(`Compiled in worker in ${message.elapsedMs}ms. Generated ${compiled.javascript.length.toLocaleString()} JS bytes.`);
          setStatus('Rendering...');
          preview.contentWindow?.postMessage({
            channel: 'jaspr-ddc-playground',
            type: 'run',
            javascript: compiled.javascript,
            moduleName: compiled.moduleName,
            libraryName: compiled.libraryName,
          }, '*');
          return;
        }

        if (message.type === 'error') {
          if (message.requestId !== undefined && message.requestId !== activeRequestId) return;
          setRunning(false);
          appendLog(message.message);
          setStatus(compilerReady ? 'Compile crashed' : 'Compiler unavailable');
        }
      });

      compilerWorker.addEventListener('error', (event) => {
        setRunning(false);
        appendLog(`Compiler worker error: ${event.message} (${event.filename}:${event.lineno}:${event.colno})`);
        setStatus('Compiler unavailable');
      });

      compilerWorker.addEventListener('messageerror', () => {
        setRunning(false);
        appendLog('Compiler worker message could not be cloned.');
        setStatus('Compiler unavailable');
      });

      addEventListener('message', (event) => {
        const message = event.data;
        if (message?.channel !== 'jaspr-ddc-preview') return;
        if (message.type === 'preview-ready') {
          previewReady = true;
          setStatus(compilerReady ? 'Ready' : 'Preview ready, loading compiler');
          setRunning(false);
          maybeAutorun();
        } else if (message.type === 'rendered') {
          setStatus('Rendered');
        } else if (message.type === 'console') {
          appendLog(`[${message.level}] ${message.message}`);
        } else if (message.type === 'runtime-error') {
          appendLog(`Runtime error: ${message.message}`);
          setStatus('Runtime error');
        }
      });

      runButton.addEventListener('click', run);
      pubGetButton.addEventListener('click', runPubGet);
      showPackagesButton.addEventListener('click', showPackages);
      toggleExplorerButton.addEventListener('click', () => {
        explorerCollapsed = !explorerCollapsed;
        applyExplorerCollapsed();
      });
      newFileButton.addEventListener('click', createFile);
      renameFileButton.addEventListener('click', renameActiveFile);
      deleteFileButton.addEventListener('click', deleteActiveFile);
      resetButton.addEventListener('click', () => {
        workspace = cloneDefaultWorkspace();
        activePath = entrypoint;
        editor?.setModel(null);
        for (const model of models.values()) model.dispose();
        models.clear();
        lspVersions.clear();
        editor?.setModel(modelForPath(activePath));
        renderWorkspaceChrome();
        saveWorkspace();
        localStorage.removeItem(adapter.legacySourceStorageKey);
        markPubspecDirty();
        if (lspReady) {
          for (const path of sortedPaths().filter((candidate) => candidate.endsWith('.dart'))) {
            lspNotify('textDocument/didOpen', {
              textDocument: {
                uri: fileUri(path),
                languageId: 'dart',
                version: lspVersions.get(path) ?? 1,
                text: workspace[path],
              },
            });
          }
        }
        void updatePubspecDiagnostics();
      });

      initSplitter();
      monaco = await loadMonaco();
      registerDart(monaco);
      renderWorkspaceChrome();
      applyExplorerCollapsed();
      editor = monaco.editor.create(editorHost, {
        model: modelForPath(activePath),
        theme: matchMedia('(prefers-color-scheme: dark)').matches ? 'vs-dark' : 'vs',
        automaticLayout: true,
        fontSize: 13,
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        tabSize: 2,
        wordBasedSuggestions: 'off',
      });
      editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, run);
      editor.onDidChangeModelContent(() => {
        const previousSource = workspace[activePath];
        const source = currentSource();
        workspace[activePath] = source;
        saveWorkspace();
        markDependenciesDirtyIfNeeded(activePath, previousSource);
        lspDidChange(activePath, source);
        void updatePubspecDiagnostics();
      });
      registerLspProviders();
      void updatePubspecDiagnostics();
      initLsp();
    </script>
  </body>
